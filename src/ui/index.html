<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moloni Downloader</title>
<style>
  /* Paleta ancorada na marca ALLPRA (logo preto/branco) — sem azul-SaaS
     genérico. Cinzas quentes, não o cinza-azulado padrão do Tailwind. */
  :root {
    --tinta: #14161a; --tinta-forte: #000;
    --papel: #fff; --linha: #e4e4e1;
    --texto: #1a1a1a; --texto-suave: #6f6f6b;
    --erro: #a3342b; --ok: #276b42;
  }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif; max-width: 34rem;
    margin: 3.5rem auto; padding: 0 1.25rem; color: var(--texto); line-height: 1.55;
  }

  /* O tratamento maiúsculo/espaçado, usado em todos os rótulos de secção, é o
     elemento assinatura da página — ecoa diretamente a tipografia do logo
     ALLPRA ("A L L P R A"), em vez de um cliché genérico. */
  .eyebrow {
    display: block; font-size: 0.72rem; font-weight: 600; color: var(--texto-suave);
    text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 0.6rem;
  }

  h1 { font-size: 1.3rem; font-weight: 600; margin: 0 0 0.2rem; letter-spacing: -0.01em; }
  p.sub { color: var(--texto-suave); margin: 0 0 2rem; }

  /* Secções separadas por uma linha fina, não uma caixa fechada — evita o
     "ar de formulário HTML cru" de um <fieldset> com borda pesada. */
  fieldset {
    border: 0; border-top: 1px solid var(--linha);
    padding: 1.4rem 0; margin: 0;
  }
  fieldset:first-of-type { border-top: 0; padding-top: 0; }
  legend { padding: 0; width: 100%; }

  .datas { display: flex; gap: 1.25rem; }
  .datas label { flex: 1; display: block; font-size: 0.8rem; color: var(--texto-suave); }

  input[type=date], input[type=text], input[type=password], select {
    width: 100%; padding: 0.55rem 0.65rem; font-size: 0.95rem;
    border: 1px solid var(--linha); border-radius: 6px; font-family: inherit;
    color: var(--texto); background: var(--papel);
  }
  input:focus-visible, select:focus-visible, button:focus-visible, a:focus-visible {
    outline: 2px solid var(--tinta); outline-offset: 2px;
  }

  .campo { display: block; margin-bottom: 0.9rem; font-size: 0.8rem; color: var(--texto-suave); }
  .campo input, .campo select { margin-top: 0.3rem; color: var(--texto); }
  .tipo { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0; font-size: 0.95rem; }

  button {
    background: var(--tinta); color: #fff; border: 0; border-radius: 6px;
    padding: 0.65rem 1.1rem; font-size: 0.9rem; font-weight: 500; cursor: pointer;
  }
  button:hover:not(:disabled) { background: var(--tinta-forte); }
  button:disabled { background: var(--linha); color: var(--texto-suave); cursor: default; }
  button.sec { background: transparent; color: var(--texto); border: 1px solid var(--linha); }
  button.sec:hover:not(:disabled) { border-color: var(--tinta); background: transparent; }
  .acoes { display: flex; gap: 0.75rem; margin-top: 1.6rem; }

  #painel { margin-top: 1.75rem; display: none; }
  #estado { font-variant-numeric: tabular-nums; font-size: 0.9rem; }

  /* A barra nativa varia feio entre browsers — uma trilha cinza fina com
     preenchimento sólido lê-se melhor do que a versão por defeito. */
  progress { width: 100%; height: 0.4rem; border: 0; border-radius: 999px;
             overflow: hidden; margin-top: 0.6rem; }
  progress::-webkit-progress-bar { background: var(--linha); border-radius: 999px; }
  progress::-webkit-progress-value { background: var(--tinta); border-radius: 999px; }
  progress::-moz-progress-bar { background: var(--tinta); border-radius: 999px; }

  .erro { color: var(--erro); }
  .ok { color: var(--ok); font-weight: 600; }
  /* Sem isto o link herdava o azul nativo do browser — quebrava a paleta
     monocromática ancorada na marca. */
  #aviso-config a { color: inherit; font-weight: 600; }
  details { margin-top: 0.9rem; font-size: 0.85rem; }
  summary { cursor: pointer; color: var(--texto-suave); }
  li { font-size: 0.83rem; color: var(--texto-suave); }

  /* Cabeçalho de logos: só existe se houver ficheiros em branding/ */
  #marca { display: none; align-items: center; gap: 1.4rem; margin-bottom: 3rem; }
  #marca.tem { display: flex; }
  #marca img { max-height: 64px; max-width: 45%; object-fit: contain; }
  #marca .liga { flex: 1; height: 1px; background: var(--linha); }
  /* O logo do fornecedor (ALLPRA) é um JPEG de fundo preto sólido, sem canal
     alfa — sem isto ficava um retângulo preto colado à página branca. */
  #marca .fornecedor { background: #000; padding: 0.7rem 1.1rem; border-radius: 8px; }

  /* Tabs, com o mesmo tratamento eyebrow do resto da página */
  #tabs { display: flex; gap: 1.5rem; margin-bottom: 2.5rem; border-bottom: 1px solid var(--linha); }
  #tabs button {
    background: none; border: none; color: var(--texto-suave); padding: 0 0 0.75rem;
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em;
    border-bottom: 2px solid transparent; border-radius: 0; cursor: pointer;
  }
  #tabs button:hover:not(.ativa) { color: var(--texto); }
  #tabs button.ativa { color: var(--tinta); border-bottom-color: var(--tinta); }

  section[hidden] { display: none; }
  .lista-teste { list-style: none; padding: 0; margin: 0.9rem 0 0; }
  .lista-teste li { margin: 0.4rem 0; }

  @media (max-width: 26rem) {
    .datas { flex-direction: column; gap: 0.9rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div id="marca"></div>

<nav id="tabs">
  <button type="button" data-tab="descarregar">Descarregar</button>
  <button type="button" data-tab="config">Configuração</button>
</nav>

<section id="tab-descarregar" hidden>
  <h1>Descarregar documentos Moloni</h1>
  <p class="sub">Escolhe o período e os tipos de documento.</p>

  <form id="form">
    <fieldset>
      <legend class="eyebrow">Período</legend>
      <div class="datas">
        <label>De <input type="date" id="inicio" required></label>
        <label>Até <input type="date" id="fim" required></label>
      </div>
    </fieldset>

    <fieldset>
      <legend class="eyebrow">Tipos de documento</legend>
      <div id="tipos"></div>
    </fieldset>

    <p id="aviso-config" class="erro" hidden>
      Falta preencher a <a href="#" id="ir-a-config">Configuração</a> antes de poderes descarregar.
    </p>
    <button type="submit" id="btn">Descarregar</button>
  </form>

  <div id="painel">
    <p id="estado">A preparar…</p>
    <progress id="barra" max="100" value="0"></progress>
    <div id="resumo"></div>
  </div>
</section>

<section id="tab-config" hidden>
  <h1>Configuração</h1>
  <p class="sub">Credenciais Moloni e onde guardar os documentos.</p>

  <form id="form-config">
    <fieldset>
      <legend class="eyebrow">Credenciais Moloni</legend>
      <label class="campo">Client ID
        <input type="text" id="cfg-clientId" autocomplete="off">
      </label>
      <label class="campo">Client Secret
        <input type="password" id="cfg-clientSecret" autocomplete="off">
      </label>
      <label class="campo">Utilizador
        <input type="text" id="cfg-username" autocomplete="off">
      </label>
      <label class="campo">Password
        <input type="password" id="cfg-password" autocomplete="off">
      </label>
      <label class="campo">ID da empresa
        <input type="text" id="cfg-companyId" autocomplete="off">
      </label>
    </fieldset>

    <fieldset>
      <legend class="eyebrow">Destino</legend>
      <label class="campo">Pasta onde guardar
        <input type="text" id="cfg-downloadDir" autocomplete="off">
      </label>
      <label class="campo">Organizar por
        <select id="cfg-estrutura">
          <option value="tipo-data">Tipo, depois mês — ex.: Recibos/2026-06/</option>
          <option value="data-tipo">Mês, depois tipo — ex.: 2026-06/Recibos/</option>
        </select>
      </label>
    </fieldset>

    <div class="acoes">
      <button type="button" class="sec" id="cfg-testar">Testar ligação</button>
      <button type="submit" id="cfg-guardar">Guardar</button>
    </div>
  </form>

  <div id="cfg-resultado"></div>
</section>

<script>
const $ = id => document.getElementById(id);

// Os motivos de erro trazem texto CRU da API do Moloni — o documents.js mete lá
// JSON.stringify da resposta inesperada. Nada disso entra em innerHTML sem passar
// por aqui: `<img src=x onerror=...>` injetado assim chega a executar.
const esc = s => String(s).replace(/[&<>"']/g, c =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

// --- Tabs ---
function mudarTab(nome) {
  for (const btn of document.querySelectorAll('#tabs button')) {
    btn.classList.toggle('ativa', btn.dataset.tab === nome);
  }
  $('tab-descarregar').hidden = nome !== 'descarregar';
  $('tab-config').hidden = nome !== 'config';
}
for (const btn of document.querySelectorAll('#tabs button')) {
  btn.onclick = () => mudarTab(btn.dataset.tab);
}

// Saber se há job a decorrer é o que permite distinguir "a ligação caiu e o
// download morreu" de "o browser reconectou o SSE sem nada estar a acontecer".
let jobACorrer = false;

// O botão tem dois motivos possíveis para estar bloqueado: um job a decorrer,
// ou a configuração ainda incompleta. Centralizado aqui para os dois nunca se
// pisarem — sem isto, um `libertarBotao()` no fim de um job podia reabilitar
// o botão mesmo sem credenciais Moloni preenchidas.
let configEstaCompleta = false;

function atualizarBotaoDescarregar() {
  $('aviso-config').hidden = configEstaCompleta;
  if (jobACorrer) {
    $('btn').disabled = true;
  } else {
    $('btn').disabled = !configEstaCompleta;
    $('btn').textContent = 'Descarregar';
  }
}

function libertarBotao() {
  jobACorrer = false;
  atualizarBotaoDescarregar();
}

$('ir-a-config').onclick = e => { e.preventDefault(); mudarTab('config'); };

// Todo o caminho de erro passa por aqui — se algum não passar, o botão fica
// preso em "A descarregar…" e ela tem de recarregar a página sem perceber porquê.
function mostrarErro(msg) {
  $('painel').style.display = 'block';
  $('estado').innerHTML = `<span class="erro">${esc(msg)}</span>`;
  libertarBotao();
}

// Por defeito: do dia 1 deste mês até hoje — o mês corrente até ao momento.
(function preencherDatas() {
  const hoje = new Date();
  const primeiro = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
  const iso = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  $('inicio').value = iso(primeiro);
  $('fim').value = iso(hoje);
})();

// ALLPRA à esquerda (o fornecedor, sempre o mesmo), o cliente à direita.
// Uma instalação sem logos não mostra cabeçalho nenhum — o branding nunca pode
// ser o motivo de a app não abrir.
fetch('/api/branding').then(r => r.json()).then(({ fornecedor, cliente }) => {
  if (!fornecedor && !cliente) return;
  const img = (src, classe) => `<img src="${src}" alt="" class="${classe || ''}">`;
  $('marca').innerHTML =
    (fornecedor ? img(fornecedor, 'fornecedor') : '') +
    '<span class="liga"></span>' +
    (cliente ? img(cliente) : '');
  $('marca').className = 'tem';
}).catch(() => { /* sem branding, seguimos sem cabeçalho */ });

// Nenhum tipo ligado por defeito, de propósito: com os três ligados, um clique
// distraído descarregava tudo. Escolher é uma decisão consciente — e o
// formulário recusa-se a avançar sem pelo menos um.
fetch('/api/tipos').then(r => r.json()).then(tipos => {
  $('tipos').innerHTML = Object.entries(tipos).map(([chave, etiqueta]) =>
    `<label class="tipo"><input type="checkbox" name="tipo" value="${chave}"> ${etiqueta}</label>`
  ).join('');
});

// --- Configuração ---

// Campos secretos nunca vêm preenchidos do servidor — só se JÁ estão
// definidos. O placeholder diz isso, e o próprio botão de guardar sabe que um
// campo vazio significa "não mexer", nunca "apagar" (é o servidor que decide
// isso, em configStore.js — aqui só se comunica a regra a quem preenche).
function carregarConfigNoFormulario(cfg) {
  $('cfg-clientId').value = cfg.clientId;
  $('cfg-username').value = cfg.username;
  $('cfg-companyId').value = cfg.companyId;
  $('cfg-downloadDir').value = cfg.downloadDir;
  $('cfg-estrutura').value = cfg.estrutura;
  $('cfg-clientSecret').placeholder = cfg.clientSecretPreenchido
    ? '········ (preenchido — deixa vazio para manter)' : 'obrigatório';
  $('cfg-password').placeholder = cfg.passwordPreenchido
    ? '········ (preenchida — deixa vazio para manter)' : 'obrigatória';
  return cfg;
}

function configCompleta(cfg) {
  return !!(cfg.clientId && cfg.username && cfg.companyId
    && cfg.clientSecretPreenchido && cfg.passwordPreenchido);
}

function valoresDoFormularioConfig() {
  return {
    clientId: $('cfg-clientId').value.trim(),
    clientSecret: $('cfg-clientSecret').value,
    username: $('cfg-username').value.trim(),
    password: $('cfg-password').value,
    companyId: $('cfg-companyId').value.trim(),
    downloadDir: $('cfg-downloadDir').value.trim(),
    estrutura: $('cfg-estrutura').value,
  };
}

function renderizarResultadoTeste(relatorio) {
  const linha = r => {
    const classe = r.ok === true ? 'ok' : r.ok === false ? 'erro' : '';
    const marca = r.ok === true ? '✓' : r.ok === false ? '✗' : '…';
    return `<li class="${classe}">${marca} ${esc(r.mensagem)}</li>`;
  };
  $('cfg-resultado').innerHTML = `<ul class="lista-teste">${relatorio.resultados.map(linha).join('')}</ul>`;
}

// Único sítio que fala com GET /api/config: preenche o formulário e atualiza
// se o botão "Descarregar" pode estar ativo. Chamado no arranque e outra vez
// depois de gravar — o botão nunca deve ficar desatualizado em relação ao
// que está realmente gravado no servidor.
async function recarregarConfig() {
  const cfg = await fetch('/api/config').then(r => r.json());
  carregarConfigNoFormulario(cfg);
  configEstaCompleta = configCompleta(cfg);
  atualizarBotaoDescarregar();
  return cfg;
}

// Ao abrir a app: se faltar alguma credencial, mostra logo a tab de
// Configuração — não faz sentido oferecer "Descarregar" a quem ainda não pode.
recarregarConfig()
  .then(cfg => mudarTab(configEstaCompleta ? 'descarregar' : 'config'))
  .catch(() => mudarTab('descarregar'));

$('cfg-testar').onclick = async () => {
  $('cfg-testar').disabled = true;
  $('cfg-testar').textContent = 'A testar…';
  $('cfg-resultado').innerHTML = '<p>A testar a ligação ao Moloni…</p>';
  try {
    const resposta = await fetch('/api/config/testar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(valoresDoFormularioConfig()),
    });
    renderizarResultadoTeste(await resposta.json());
  } catch {
    $('cfg-resultado').innerHTML = '<p class="erro">Não foi possível falar com a aplicação.</p>';
  } finally {
    $('cfg-testar').disabled = false;
    $('cfg-testar').textContent = 'Testar ligação';
  }
};

$('form-config').onsubmit = async e => {
  e.preventDefault();
  $('cfg-guardar').disabled = true;
  $('cfg-guardar').textContent = 'A guardar…';

  try {
    const resposta = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(valoresDoFormularioConfig()),
    });
    const corpo = await resposta.json().catch(() => ({}));

    if (!resposta.ok) {
      $('cfg-resultado').innerHTML = `<p class="erro">${esc(corpo.erro || 'Não foi possível guardar.')}</p>`;
    } else {
      $('cfg-resultado').innerHTML = '<p class="ok">Configuração guardada.</p>';
      // Recarrega para os campos secretos voltarem a mostrar "preenchido" em
      // vez do que ela acabou de escrever, e para o botão "Descarregar" ficar
      // disponível assim que a configuração completa a torna válida.
      await recarregarConfig();
    }
  } catch {
    $('cfg-resultado').innerHTML = '<p class="erro">Não foi possível falar com a aplicação.</p>';
  } finally {
    $('cfg-guardar').disabled = false;
    $('cfg-guardar').textContent = 'Guardar';
  }
};

// --- Descarregar ---

const fmt = n => n.toLocaleString('pt-PT');

const fonte = new EventSource('/api/eventos');

// Sem isto, se a ligação cair (o servidor reinicia, ou rebenta), o browser
// reconecta em silêncio — mas o job morreu com o processo antigo e nunca mais
// chega 'concluido' nem 'erro'. Ela ficava a olhar para uma barra parada sem
// saber se ainda está a listar (que demora 3-5 min, e é normal) ou se morreu.
// Como isto corre em localhost, uma ligação perdida significa quase de certeza
// que o servidor caiu — vale mais um falso alarme do que um silêncio eterno.
fonte.onerror = () => {
  if (!jobACorrer) return; // reconexão sem job a decorrer não interessa a ninguém
  mostrarErro('Perdeu-se a ligação à aplicação. O download pode não ter terminado — '
    + 'confirma a pasta e tenta outra vez.');
};

fonte.onmessage = e => {
  const ev = JSON.parse(e.data);

  if (ev.fase === 'listar') {
    $('barra').removeAttribute('value'); // indeterminada: ainda não se sabe o total
    $('estado').textContent = `A procurar ${ev.tipo} de ${ev.ano}… ${fmt(ev.verificados || 0)} verificados`;
  }
  if (ev.fase === 'listagem-concluida') {
    $('estado').textContent = `${fmt(ev.total)} documentos encontrados. A descarregar…`;
    $('barra').value = 0;
  }
  if (ev.fase === 'descarregar') {
    $('barra').value = ev.total ? (ev.feitos / ev.total) * 100 : 0;
    $('estado').textContent = `A descarregar ${fmt(ev.feitos)} de ${fmt(ev.total)}`
      + (ev.falhas ? ` — ${fmt(ev.falhas)} falhas` : '');
  }
  if (ev.fase === 'concluido') {
    $('barra').value = 100;
    $('estado').innerHTML = `<span class="ok">Concluído: ${fmt(ev.sucesso)} de ${fmt(ev.total)} guardados.</span>`;
    let html = '<p><button class="sec" id="abrir">Abrir pasta</button></p>';
    if (ev.falhas?.length) {
      html += `<details><summary>${fmt(ev.falhas.length)} falharam</summary><ul>`
        + ev.falhas.map(f => `<li>${esc(f.numero)}: ${esc(f.motivo)}</li>`).join('')
        + '</ul></details>';
    }
    $('resumo').innerHTML = html;
    $('abrir').onclick = () => fetch('/api/abrir-pasta', { method: 'POST' });
    libertarBotao();
  }
  if (ev.fase === 'erro') {
    mostrarErro(`Erro: ${ev.motivo}`);
  }
};

$('form').onsubmit = async e => {
  e.preventDefault();
  // Defesa a mais: o botão desabilitado já impede o clique, mas um Enter num
  // campo de data dispara o submit do formulário na mesma.
  if (!configEstaCompleta) return mostrarErro('Falta preencher a Configuração antes de poderes descarregar.');
  const tipos = [...document.querySelectorAll('input[name=tipo]:checked')].map(c => c.value);
  if (tipos.length === 0) return mostrarErro('Escolhe pelo menos um tipo de documento.');

  jobACorrer = true;
  $('btn').disabled = true;
  $('btn').textContent = 'A descarregar…';
  $('painel').style.display = 'block';
  $('resumo').innerHTML = '';
  $('estado').textContent = 'A preparar…';

  try {
    const resposta = await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ inicio: $('inicio').value, fim: $('fim').value, tipos }),
    });

    if (!resposta.ok) {
      const { erro } = await resposta.json()
        .catch(() => ({ erro: 'A aplicação recusou o pedido.' }));
      mostrarErro(erro);
    }
  } catch {
    // Isto corre em localhost: se o fetch rebenta, o servidor caiu ou nunca
    // arrancou. Sem este catch, a promessa rejeitava em silêncio e o botão
    // ficava preso em "A descarregar…" até ela recarregar a página.
    mostrarErro('Não foi possível falar com a aplicação. Fecha esta janela e '
      + 'abre outra vez pelo atalho.');
  }
};
</script>
</body>
</html>
